openapi: 3.0.3

info:
  title: Bank Client API
  description: API for managing personal, VIP, business and PYME bank clients.
  version: 1.0.0

servers:
  - url: http://localhost:8081
    description: Local development server

tags:
  - name: Clients
    description: Operations for managing bank clients

paths:
  /api/v1/clients:
    post:
      tags:
        - Clients
      summary: Create a bank client
      operationId: createClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
            examples:
              personalClient:
                summary: Personal client
                value:
                  clientType: PERSONAL
                  documentType: DNI
                  documentNumber: "71234567"
                  firstName: Chris
                  lastName: Vega
              vipClient:
                summary: VIP personal client
                value:
                  clientType: PERSONAL_VIP
                  documentType: DNI
                  documentNumber: "71234568"
                  firstName: Andrea
                  lastName: Rojas
              businessClient:
                summary: Business client
                value:
                  clientType: BUSINESS
                  documentType: RUC
                  documentNumber: "20123456789"
                  businessName: Inversiones Vega S.A.C.
              pymeClient:
                summary: PYME business client
                value:
                  clientType: BUSINESS_PYME
                  documentType: RUC
                  documentNumber: "20987654321"
                  businessName: Servicios Rojas S.A.C.
      responses:
        '201':
          description: Client created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/DuplicateClientError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags:
        - Clients
      summary: Retrieve all active clients
      operationId: findAllClients
      responses:
        '200':
          description: Active clients retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/clients/{id}:
    get:
      tags:
        - Clients
      summary: Retrieve an active client by ID
      operationId: findClientById
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Client retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '404':
          description: Client was not found or is inactive
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Clients
      summary: Update an active client
      description: Personal clients can update firstName and lastName. Business clients can update businessName.
      operationId: updateClient
      parameters:
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
            examples:
              updatePersonalClient:
                summary: Update personal client
                value:
                  firstName: Christopher
                  lastName: Vega
              updateBusinessClient:
                summary: Update business client
                value:
                  businessName: Nueva Razon Social S.A.C.
      responses:
        '200':
          description: Client updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Clients
      summary: Logically delete a client
      description: Marks the client as inactive without physically deleting its document.
      operationId: deleteClient
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '204':
          description: Client logically deleted successfully
        '422':
          $ref: '#/components/responses/BusinessRuleError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/clients/document/{documentNumber}:
    get:
      tags:
        - Clients
      summary: Retrieve an active client by document number
      operationId: findClientByDocumentNumber
      parameters:
        - name: documentNumber
          in: path
          required: true
          description: Client document number
          schema:
            type: string
            maxLength: 20
          example: "71234567"
      responses:
        '200':
          description: Client retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '404':
          description: Client was not found or is inactive
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    ClientId:
      name: id
      in: path
      required: true
      description: MongoDB client identifier
      schema:
        type: string
      example: 68743de0c8315a79eb853f02

  schemas:
    ClientType:
      type: string
      description: Bank client classification
      enum:
        - PERSONAL
        - PERSONAL_VIP
        - BUSINESS
        - BUSINESS_PYME

    DocumentType:
      type: string
      description: Client identification document type
      enum:
        - DNI
        - RUC
        - PASSPORT

    CreateClientRequest:
      type: object
      required:
        - clientType
        - documentType
        - documentNumber
      properties:
        clientType:
          $ref: '#/components/schemas/ClientType'
        documentType:
          $ref: '#/components/schemas/DocumentType'
        documentNumber:
          type: string
          minLength: 1
          maxLength: 20
          example: "71234567"
        firstName:
          type: string
          maxLength: 50
          nullable: true
          example: Chris
        lastName:
          type: string
          maxLength: 40
          nullable: true
          example: Vega
        businessName:
          type: string
          maxLength: 50
          nullable: true
          example: Inversiones Vega S.A.C.
      description: |
        Business rules:
        * PERSONAL and PERSONAL_VIP require firstName and lastName.
        * PERSONAL and PERSONAL_VIP must not provide businessName.
        * BUSINESS and BUSINESS_PYME require businessName.
        * BUSINESS and BUSINESS_PYME must not provide firstName or lastName.

    UpdateClientRequest:
      type: object
      minProperties: 1
      properties:
        firstName:
          type: string
          maxLength: 50
          nullable: true
        lastName:
          type: string
          maxLength: 40
          nullable: true
        businessName:
          type: string
          maxLength: 50
          nullable: true
      description: |
        At least one non-blank field must be provided.
        Personal clients can update firstName and lastName.
        Business clients can update businessName.

    ClientResponse:
      type: object
      required:
        - id
        - clientType
        - documentType
        - documentNumber
        - displayName
        - active
      properties:
        id:
          type: string
          example: 68743de0c8315a79eb853f02
        clientType:
          $ref: '#/components/schemas/ClientType'
        documentType:
          $ref: '#/components/schemas/DocumentType'
        documentNumber:
          type: string
          example: "71234567"
        displayName:
          type: string
          example: Chris Vega
        active:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      required:
        - code
        - message
        - timestamp
        - path
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: documentNumber: Document number is required
        timestamp:
          type: string
          format: date-time
          example: "2026-07-19T19:30:00Z"
        path:
          type: string
          example: /api/v1/clients

  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    DuplicateClientError:
      description: A client with the same document number already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: CLIENT_ALREADY_EXISTS
            message: Client already exists with document number 71234567
            timestamp: "2026-07-19T19:30:00Z"
            path: /api/v1/clients
    BusinessRuleError:
      description: A business rule was violated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: BUSINESS_RULE_VIOLATION
            message: Client not found with id 68743de0c8315a79eb853f02
            timestamp: "2026-07-19T19:30:00Z"
            path: /api/v1/clients/68743de0c8315a79eb853f02
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: INTERNAL_SERVER_ERROR
            message: An unexpected error occurred
            timestamp: "2026-07-19T19:30:00Z"
            path: /api/v1/clients
